buildscript {
    ext {
        kotlin_version = '1.9.0' // Usar uma versão estável mais recente do Kotlin
        jitsi_meet_version = '8.0.0' // Versão estável mais recente do Jitsi Meet SDK
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0' // Usar uma versão estável mais recente do Gradle Plugin
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
